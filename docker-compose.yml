version: '3.8'

services:
  uniops:
    build: .
    ports:
      - "6020:6020"
    volumes:
      - ./data:/root/data
    environment:
      - JWT_SECRET=your-secret-key-here
      - DB_PATH=/root/data/uniops.db
    restart: unless-stopped

  # Optional: Test SSH server
  test-server:
    image: linuxserver/openssh-server
    environment:
      - PUID=1000
      - PGID=1000
      - USER_NAME=testuser
      - USER_PASSWORD=testpass
    ports:
      - "2222:2222"
